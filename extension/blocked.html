<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CleanBrowse | Site Blocked</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff7ed;
        --card: #ffffff;
        --text: #7c2d12;
        --muted: #9a3412;
        --accent: #ea580c;
        --border: #fdba74;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #ffedd5, var(--bg));
        color: var(--text);
      }

      main {
        width: min(100%, 560px);
        padding: 32px;
        border: 2px solid var(--border);
        border-radius: 20px;
        background: var(--card);
        box-shadow: 0 20px 45px rgba(124, 45, 18, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.5;
        color: var(--muted);
      }

      code {
        display: block;
        margin-top: 16px;
        padding: 12px;
        overflow-wrap: anywhere;
        border-radius: 12px;
        background: #fff3e6;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Site Blocked</h1>
      <p>CleanBrowse blocked this page because its address appears to contain content that may be unsafe for kids.</p>
      <p id="details">URL unavailable.</p>
      <code id="url"></code>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const blockedUrl = params.get("url");

      if (blockedUrl) {
        document.getElementById("details").textContent = "Blocked address:";
        document.getElementById("url").textContent = blockedUrl;
      }
    </script>
  </body>
</html>
